<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>NDVI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* BACKGROUND */

body{

margin:0;

font-family:Arial;

background:linear-gradient(135deg,#020024,#090979,#000000);

color:white;

}


/* NAVBAR */

.navbar{

display:flex;

justify-content:space-between;

padding:15px 40px;

background:black;

}

.navbar h2{

color:#4CAF50;

}

.navbar a{

color:white;

text-decoration:none;

margin-left:20px;

}


/* MAIN CONTAINER */

.container{

padding:40px;

}


/* CARD GRID */

.grid{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:30px;

}


.card{

background:#111;

padding:20px;

border-radius:10px;

text-align:center;

box-shadow:0 0 15px rgba(0,255,0,0.3);

}

.card h1{

color:#4CAF50;

}


/* IMAGE */

.image-box{

text-align:center;

margin-bottom:30px;

}


.image-box img{

width:500px;

border-radius:10px;

box-shadow:0 0 20px black;

}


/* CHART */

.chart-container{

background:#111;

padding:20px;

border-radius:10px;

width:600px;

margin:auto;

}

</style>

</head>



<body>



<!-- NAVBAR -->

<div class="navbar">

<h2>NDVI Monitoring</h2>

<div>

<a href="/">Home</a>

<a href="/map">Analyze</a>

</div>

</div>



<div class="container">


<h1>NDVI Dashboard</h1>



<!-- STATS CARDS -->

<div class="grid">


<div class="card">

<h1>{{ mean }}</h1>

<p>Mean NDVI</p>

</div>


<div class="card">

<h1>{{ vegetation }}%</h1>

<p>Vegetation Coverage</p>

</div>


<div class="card">

<h1>{{ health }}</h1>

<p>Health Status</p>

</div>


<div class="card">

<h1>{{ lat }}, {{ lon }}</h1>

<p>Location</p>

</div>


</div>



<!-- IMAGE -->

<div class="image-box">

<h2>Satellite NDVI Image</h2>

<img src="/static/result.png">

</div>



<!-- CHART -->

<div class="chart-container">

<canvas id="chart"></canvas>

</div>



</div>




<script>


const meanValue = JSON.parse('{{ mean | tojson }}');

const vegetationValue = JSON.parse('{{ vegetation | tojson }}');


new Chart(document.getElementById("chart"),{


type:"bar",


data:{


labels:["Mean NDVI","Vegetation %"],


datasets:[{


label:"NDVI Statistics",


data:[meanValue,vegetationValue],


backgroundColor:[


"#4CAF50",

"#2196F3"

]


}]


}


});




</script>




</body>

</html>
